kind = "web"
previewPath = "/"
title = "Data Toto Macau"
version = "1.0.0"
id = "artifacts/toto-macau"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23007

[services.development]
run = "pnpm --filter @workspace/toto-macau run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toto-macau", "run", "build" ]
publicDir = "artifacts/toto-macau/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23007"
BASE_PATH = "/"
